title: Tayeb Merabti
subtitle: "Health Terminologies & Interoperability Expert"
email: tayeb.merabti@gmail.com
description: >-
  Expert en terminologies médicales et interopérabilité santé —
  FHIR · SNOMED CT · UMLS · Semantic Web
url: ""
baseurl: "/"
repository: "tayeb83/tayeb83.github.io"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /blog/page:num/
timezone: Europe/Paris

include:
  - _pages

exclude:
  - vendor
  - .bundle
  - .sass-cache
  - Gemfile.lock
  - bin
  - "*.gem"
  - "*.gemspec"

keep_files:
  - .git
  - .nojekyll

# Author
author:
  name: "Tayeb Merabti"
  avatar: "/assets/images/prof_pic.jpg"
  bio: "Responsable Plateforme Terminologie & Interopérabilité Santé · VIDAL"
  location: "Paris, France"
  email: "tayeb.merabti@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/tayeb-merabti-phd-39871834"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/tayebM"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache

# Analytics (optional, leave blank)
analytics:
  provider: false
