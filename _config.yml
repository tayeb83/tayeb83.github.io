title: Tayeb Merabti
subtitle: "Health Terminologies & Interoperability Expert"
email: tayeb.merabti@gmail.com
description: >-
  Expert en terminologies médicales et interopérabilité santé —
  FHIR · SNOMED CT · UMLS · Semantic Web
url: ""
baseurl: "/"
repository: "tayeb83/tayeb83.github.io"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "mint"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /blog/page:num/
timezone: Europe/Paris

include:
  - _pages

exclude:
  - vendor
  - .bundle
  - .sass-cache
  - Gemfile.lock
  - bin
  - "*.gem"
  - "*.gemspec"

keep_files:
  - .git
  - .nojekyll

# Author
author:
  name: "Tayeb Merabti, PhD"
  avatar: "/assets/images/prof_pic.jpg"
  bio: >-
    Responsable Plateforme Terminologie & Interopérabilité Santé · **VIDAL**<br>
    SNOMED CT · FHIR · UMLS · Web Sémantique
  location: "Paris, France"
  email: "tayeb.merabti@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/tayebmerabti"
    - label: "Twitter / X"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/tayebM"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0002-9952-6170"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache

# Analytics (optional, leave blank)
analytics:
  provider: false
